<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Courses</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</head>
<script>
    document.addEventListener("DOMContentLoaded", function () {
    
        loadCourses();
    
        document.getElementById("courseForm").addEventListener("submit", function(e) {
            e.preventDefault();
    
            let course = {
                name: document.getElementById("courseName").value,
                id: document.getElementById("courseID").value,
                subject: document.getElementById("courseSubject").value,
                credits: document.getElementById("credits").value
            };
    
            let courses = JSON.parse(localStorage.getItem("courses")) || [];
            courses.push(course);
            localStorage.setItem("courses", JSON.stringify(courses));
    
            loadCourses();
    
            document.getElementById("courseForm").reset();
        });
    
    });
    
    
    function loadCourses() {
        let courses = JSON.parse(localStorage.getItem("courses")) || [];

        document.getElementById("courseTableBody").innerHTML="";

        courses.forEach((course, index)=> addCourseToTable(course,index));
    }
    
    function addCourseToTable(course, index) {
        let row = document.createElement("tr");
    
        row.innerHTML = `
            <td>${course.name}</td>
            <td>${course.id}</td>
            <td>${course.subject}</td>
            <td>${course.credits}</td>
            <td>
                <button onclick="editCourse(${index})" class="btn btn-warning btn-sm">Edit</button>
                <button onclick="deleteCourse(${index})" class="btn btn-danger btn-sm">Delete</button>
            </td>
           
        `;
    
        document.getElementById("courseTableBody").appendChild(row);
    }


    function deleteCourse(index) {
        let courses = JSON.parse(localStorage.getItem("courses")) || [];

        courses.splice(index,1);

        localStorage.setItem("courses", JSON.stringify(courses));

        loadCourses()
        alert("Course deleted successfully!");
    }
    
    function editCourse(index) {
            let courses = JSON.parse(localStorage.getItem("courses")) || [];

            let course = courses[index];

            document.getElementById("courseName").value = course.name;
            document.getElementById("courseID").value = course.id;
            document.getElementById("courseSubject").value = course.subject;
            document.getElementById("credits").value = course.credits;

            courses.splice(index,1);

            localStorage.setItem("courses",JSON.stringify(courses));

            alert("Edit course and submit to save!")
            loadCourses();
            
    }

    </script>
<body>
    <div class="container-fluid p-5 my-5 bg-warning text-white">
        <button type="button" class="btn btn-success">Home</button>
        <button type="button" class="btn btn-success">Login</button>
    </div>
    <div class="container-fluid p-5 my-5 bg-warning text-white">
        <nav>
            <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="login.html">Login</a></li>
            <li><a href="studentHome.html"> Student Home</a></li>
            <li><a href="courseStudent.html">Student Courses</a></li>
            <li><a href="teacherHome.html">Teacher Home</a></li>
            <li><a href="courseTeacher.html">Teacher Courses</a></li>
            </ul>
        </nav>
    </div>
    <div class="container-fluid p-5 my-5 bg-info text-white">
    <h1>Welcome, {Teacher}!</h1>
    
    </div>
   
    <div class="container-fluid p-5 my-5 bg-info text-white">
        <h1>Course Builder</h1>
        <div class= "container p-5 my-5 bg-primary text-white">
            
        <div class="container-fluid">
            <form id="courseForm">

                <input type="text" id="courseName" placeholder="Enter Course Name" required>
                <input type="text" id="courseID" placeholder="Enter Course ID" required>
                <input type="text" id="courseSubject" placeholder="Enter Subject">
                <input type="number" id="credits" min="1" max="3">
            
                <button type="submit">Submit</button>
            
            </form>
        </div>

        </div>
    
    </div>
    <div class="container p-5 my-5 bg-info text-white">
        <h2>My Courses</h2>
        <table class="table table-light">
            <thead>
                <tr>
                    <th>Course Name</th>
                    <th>Course ID</th>
                    <th>Subject</th>
                    <th>Credits</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="courseTableBody">
                
            </tbody>
        </table>
    </div>
</body>
</html>
