    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

<body>
    <div class="container-fluid p-5 my-5 bg-warning text-white">
        <button type="button" class="btn btn-success">Home</button>
        <button type="button" class="btn btn-success">Login</button>
    </div>
    <div class="container-fluid p-5 my-5 bg-warning text-white">
        <nav>
            <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="login.html">Login</a></li>
            <li><a href="studentHome.html"> Student Home</a></li>
            <li><a href="courseStudent.html">Student Courses</a></li>
            <li><a href="teacherHome.html">Teacher Home</a></li>
            <li><a href="courseTeacher.html">Teacher Courses</a></li>
            </ul>
        </nav>
    </div>
    <div class="container-fluid p-5 my-5 bg-success text-black text-center">
        <h1>Welcome, {Student}!</h1>

    </div>
    <div class="container-fluid p-5 my-5 bg-light text-black">
        <div class="text-center">
        <button type="button" style="background-color:rgb(0, 187, 255); padding: 10px 20px;" >Add Course</button>
        <button type="button" style="background-color:rgb(0, 187, 255);padding: 10px 20px" >Drop Course</button>

            <p><strong>Course Info</strong></p>
            <input type="text" id="course-id">
        </div>
        <div class="text-center">
            <button type="button" style="background-color:rgb(0, 187, 255);padding: 10px 40px;">Submit</button>
        </div>

    <div class="container-fluid p-5 my-5 bg-info text-black text-center">

    </div>

        <h1>Your Current Courses</h1>
    </div>

    <div class="container-fluid p-5 my-5 bg-info text-black text-center">
        <table style = "border: 3px solid black; padding: 10; text-align: left; border-collapse: collapse;">
            <tr>
                <th><strong>Course ID</strong></th>
                <th><strong>Course Name</strong></th>
                <th><strong> Description</strong></th>
            </tr>
        </table>
